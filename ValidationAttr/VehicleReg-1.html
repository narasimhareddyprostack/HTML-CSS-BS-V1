<html>
    <head>
        <title>Karnatak Vehicle Number Registration</title>
    </head>
    <body>
        <h3>Online Registratin Form</h3>
        <form action="/reg">
            <div>
                <label >Mobile No:</label>
                <input type="text" 
                       required 
                       <!-- pattern="[6-9][0-9]{9}" --> 
                       pattern="[6-9]\d{9}"
                       title="Enter 10 Digit Mobile Number start from 6/7/8/9/" 
                       placeholder="Enter Mobile Number"/>
            </div>
            <input type="submit">
        </form>
    </body>
</html>
