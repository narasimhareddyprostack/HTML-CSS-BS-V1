<html>
    <head>
        <title>Login - OTP</title>
    </head>
    <body>
        <h3>Get OTP</h3>
        <form action="/getOTP">
            <div>
                <label >Mobile Number:</label>
                <input type="text" pattern="[6-9][0-9]{9}" 
                  required 
                  placeholder="Buddy Enter 10 digit Number"/>
            </div>
           
            <input type="submit" value="Get OTP"> 
        </form>
    </body>
</html>
